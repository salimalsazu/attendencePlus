services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: attend_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Dhaka
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attend_user -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://attend_user:${POSTGRES_PASSWORD}@postgres:5432/attendance_db
      JWT_SECRET: ${JWT_SECRET}
      ZK_IP: ${ZK_IP}
      ZK_PORT: ${ZK_PORT:-4370}
      ZK_TIMEOUT: ${ZK_TIMEOUT:-10000}
      PORT: 4000
      TZ: Asia/Dhaka
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      TZ: Asia/Dhaka
    depends_on:
      - backend

volumes:
  postgres_data:
